<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Login</title>
<link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/045/720/728/small_2x/dark-cat-head-free-png.png">
<style>
:root {
  --bg: #0a0a0a;
  --surface-1: rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --surface-3: rgba(255,255,255,0.11);
  --border-subtle: rgba(255,255,255,0.08);
  --border-mid: rgba(255,255,255,0.14);
  --border-strong: rgba(255,255,255,0.22);
  --text-primary: #f5f5f5;
  --text-secondary: #999;
  --text-muted: #555;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ANIMATED BACKGROUND */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* LOGIN CARD */
.login-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 0 24px;
  animation: fadeUp 0.5s cubic-bezier(.4,1,.6,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-card {
  background: rgba(12,12,12,0.85);
  border: 1px solid var(--border-mid);
  border-radius: 20px;
  padding: 40px 36px 36px;
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

/* top shimmer line */
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
}

/* LOGO AREA */
.login-logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.login-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface-3); border: 1px solid var(--border-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.login-brand { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: .02em; }
.login-brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; letter-spacing: .06em; text-transform: uppercase; }

/* HEADING */
.login-heading { font-size: 22px; font-weight: 700; letter-spacing: -.01em; color: var(--text-primary); margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 28px; }

/* FORM */
.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-muted); margin-bottom: 8px;
}
.field-input {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
  font-family: inherit;
}
.field-input::placeholder { color: var(--text-muted); }
.field-input:focus {
  border-color: var(--border-strong);
  background: var(--surface-2);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
}
.field-input.error {
  border-color: rgba(180,60,60,0.7);
  background: rgba(180,60,60,0.05);
}

/* PASSWORD WRAPPER */
.pw-wrap { position: relative; }
.pw-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 14px; padding: 4px;
  transition: color .15s;
}
.pw-toggle:hover { color: var(--text-secondary); }

/* ERROR MESSAGE */
.error-msg {
  display: none;
  font-size: 12px; color: #b04040;
  margin-top: -8px; margin-bottom: 12px;
  padding: 10px 14px;
  background: rgba(180,60,60,0.08);
  border: 1px solid rgba(180,60,60,0.2);
  border-radius: 8px;
  animation: shake .3s ease;
}
.error-msg.show { display: block; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}

/* SUBMIT BUTTON */
.login-btn {
  width: 100%; padding: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 14px; font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  font-family: inherit;
  margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:hover {
  background: rgba(255,255,255,0.13);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.login-btn:active { transform: translateY(0); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* SPINNER IN BUTTON */
.btn-spinner {
  display: none;
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: rgba(255,255,255,0.8);
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* SUCCESS OVERLAY */
#success-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(16px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.success-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(60,120,60,0.2); border: 1px solid rgba(60,160,60,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  animation: popIn .4s cubic-bezier(.4,1.6,.6,1) both;
}
@keyframes popIn {
  from { opacity:0; transform: scale(.5); }
  to   { opacity:1; transform: scale(1); }
}
.success-text { font-size: 15px; color: var(--text-secondary); letter-spacing: .04em; }
.success-sub { font-size: 12px; color: var(--text-muted); }

/* FOOTER */
.login-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: .04em;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- SUCCESS OVERLAY -->
<div id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-text">Welcome back, Veera</div>
  <div class="success-sub">Redirecting to dashboard…</div>
</div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo-row">
      <div class="login-logo">🐱</div>
      <div>
        <div class="login-brand">Admin Panel</div>
        <div class="login-brand-sub">v2.0</div>
      </div>
    </div>

    <div class="login-heading">Sign in</div>
    <div class="login-sub">Enter your credentials to access the dashboard.</div>

    <div class="field">
      <label class="field-label" for="username">Username</label>
      <input class="field-input" id="username" type="text" placeholder="Enter username" autocomplete="username" spellcheck="false">
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="pw-wrap">
        <input class="field-input" id="password" type="password" placeholder="Enter password" autocomplete="current-password">
        <button class="pw-toggle" id="pw-toggle" type="button" title="Toggle visibility">👁</button>
      </div>
    </div>

    <div class="error-msg" id="error-msg">⚠ Incorrect username or password.</div>

    <button class="login-btn" id="login-btn" onclick="attemptLogin()">
      <span class="btn-spinner" id="btn-spinner"></span>
      <span id="btn-text">Sign In →</span>
    </button>

  </div>

  <div class="login-footer">Admin Panel &nbsp;·&nbsp; Restricted Access</div>
</div>

<script>
/* ---- Credentials ---- */
const VALID_USER = 'veera';
const VALID_PASS = '7777';
const REDIRECT   = 'main.html'; // change to your dashboard file name

/* ---- Password toggle ---- */
document.getElementById('pw-toggle').addEventListener('click', function () {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});

/* ---- Enter key ---- */
document.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') attemptLogin();
});

/* ---- Login logic ---- */
function attemptLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  const userInput = document.getElementById('username');
  const passInput = document.getElementById('password');
  const btn  = document.getElementById('login-btn');
  const spinner = document.getElementById('btn-spinner');
  const btnText = document.getElementById('btn-text');

  // Clear previous errors
  errEl.classList.remove('show');
  userInput.classList.remove('error');
  passInput.classList.remove('error');

  if (user === VALID_USER && pass === VALID_PASS) {
    // Show loading
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Signing in…';

    setTimeout(() => {
      // Set session flag
      sessionStorage.setItem('admin_auth', '1');
      // Show success overlay
      const overlay = document.getElementById('success-overlay');
      overlay.style.display = 'flex';

      setTimeout(() => {
        window.location.href = REDIRECT;
      }, 1400);
    }, 700);

  } else {
    // Show error
    userInput.classList.add('error');
    passInput.classList.add('error');
    errEl.classList.remove('show');
    // Force reflow to re-trigger animation
    void errEl.offsetWidth;
    errEl.classList.add('show');

    // Shake the card
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = '';
  }
}

/* ---- Animated background (same as dashboard) ---- */
(function () {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function init() {
    pts = [];
    for (let i = 0; i < 18; i++) {
      pts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - .5) * .18,
        vy: (Math.random() - .5) * .18,
        r: 60 + Math.random() * 120,
        a: 0.015 + Math.random() * 0.025
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    for (const p of pts) {
      const px = p.x + Math.sin(t / 4000 + p.r) * 18;
      const py = p.y + Math.cos(t / 3500 + p.r) * 14;
      const g = ctx.createRadialGradient(px, py, 0, px, py, p.r);
      g.addColorStop(0, `rgba(255,255,255,${p.a})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(px, py, p.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      p.x += p.vx; p.y += p.vy;
      if (p.x < -p.r) p.x = W + p.r;
      if (p.x > W + p.r) p.x = -p.r;
      if (p.y < -p.r) p.y = H + p.r;
      if (p.y > H + p.r) p.y = -p.r;
    }
    requestAnimationFrame(draw);
  }

  resize(); init(); requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); init(); }, { passive: true });
})();
</script>
