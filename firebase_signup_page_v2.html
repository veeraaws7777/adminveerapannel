
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(99,60,180,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(30,180,140,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: rgba(18,18,28,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    backdrop-filter: blur(12px);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(147,90,255,0.6), rgba(40,210,160,0.4), transparent);
    border-radius: 20px 20px 0 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c4dff, #26d0a0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #e8e8f0;
    letter-spacing: 0.5px;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    color: #f0f0ff;
    margin-bottom: 0.35rem;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 13.5px;
    color: rgba(200,200,220,0.5);
    margin-bottom: 2rem;
    font-weight: 300;
  }
  .field { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: rgba(200,200,230,0.6);
    margin-bottom: 6px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: rgba(200,200,230,0.35);
    pointer-events: none;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 14px 12px 42px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    color: #e8e8f4;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input::placeholder { color: rgba(180,180,210,0.28); }
  input:focus {
    border-color: rgba(147,90,255,0.5);
    background: rgba(255,255,255,0.06);
  }
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c4dff 0%, #26c99a 100%);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-loader {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    display: none;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    margin-top: 1.2rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .toast.show { display: flex; }
  .toast.success-toast {
    background: rgba(30,180,120,0.12);
    border: 1px solid rgba(30,180,120,0.25);
  }
  .toast.fail-toast {
    background: rgba(230,60,60,0.1);
    border: 1px solid rgba(230,60,60,0.25);
  }
  .toast-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .toast.success-toast .toast-icon { color: #2ed09a; }
  .toast.fail-toast .toast-icon { color: #f47070; }
  .toast-body { flex: 1; }
  .toast-title { font-size: 13.5px; font-weight: 600; margin-bottom: 2px; }
  .toast.success-toast .toast-title { color: #2ed09a; }
  .toast.fail-toast .toast-title { color: #f47070; }
  .toast-msg { font-size: 12.5px; color: rgba(200,200,220,0.7); line-height: 1.5; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">V7</div>
    <span class="logo-text">veera730am</span>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Join us — it only takes a moment.</p>

  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" id="username" placeholder="yourname" autocomplete="username"/>
    </div>
  </div>

  <div class="field">
    <label for="email">Email address</label>
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password"/>
    </div>
  </div>

  <button class="btn" id="signupBtn" onclick="handleSignup()">
    <span id="btnText">Create account</span>
    <div class="btn-loader" id="btnLoader"></div>
  </button>

  <div class="toast success-toast" id="successToast">
    <span class="toast-icon">✅</span>
    <div class="toast-body">
      <div class="toast-title">Account created!</div>
      <div class="toast-msg" id="successMsg">Welcome aboard. You're all set.</div>
    </div>
  </div>

  <div class="toast fail-toast" id="failToast">
    <span class="toast-icon">⚠️</span>
    <div class="toast-body">
      <div class="toast-title">Sign up failed</div>
      <div class="toast-msg" id="failMsg">Something went wrong. Please try again.</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGDqIZJzxq4-SytFSCS-FmszMsabEEzF4",
    authDomain: "veera730amoffline.firebaseapp.com",
    projectId: "veera730amoffline",
    storageBucket: "veera730amoffline.firebasestorage.app",
    messagingSenderId: "967870932835",
    appId: "1:967870932835:web:942369c87df03d0171d556",
    measurementId: "G-TCT26V9G8P"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleSignup = async function() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const successToast = document.getElementById('successToast');
    const failToast = document.getElementById('failToast');
    const btn = document.getElementById('signupBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    successToast.classList.remove('show');
    failToast.classList.remove('show');

    if (!username || !email || !password) {
      document.getElementById('failMsg').textContent = 'Please fill in all fields.';
      failToast.classList.add('show');
      return;
    }

    btn.disabled = true;
    btnText.style.display = 'none';
    btnLoader.style.display = 'block';

    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCred.user, { displayName: username });
      await setDoc(doc(db, 'users', userCred.user.uid), {
        username,
        email,
        createdAt: new Date().toISOString()
      });

      document.getElementById('successMsg').textContent = `Welcome, ${username}! Your account is ready.`;
      successToast.classList.add('show');

      document.getElementById('username').value = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
    } catch (err) {
      let msg = 'Something went wrong. Please try again.';
      if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered.';
      else if (err.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
      else if (err.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
      else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
      document.getElementById('failMsg').textContent = msg;
      failToast.classList.add('show');
    } finally {
      btn.disabled = false;
      btnText.style.display = 'block';
      btnLoader.style.display = 'none';
    }
  };
</script>
</body>
</html>
